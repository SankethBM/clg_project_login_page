<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anta&family=Itim&display=swap" rel="stylesheet">
    <title>Document</title>
</head>

<body>

    <div class="blur">
        <div class="blur inset-0 justify-center">
            <div class="bg-shade1 bg-teal opacity-50 bg-blur"></div>
            <div class="bg-shade2 bg-white opacity-50 bg-blur"></div>
            <div class="bg-shade1 bg-purple opacity-50 bg-blur"></div>
        </div>
    </div>

    <div class="container d-flex justify-content-center align-items-center min-vh-100 bg-white">
        <div class="row border rounded-5 p-3 bg-white shadow box-area" style="width: 930px; border-radius: 20px;">
            <div class="col-md-6 rounded-4 d-flex justify-content-center align-items-center flex-column left-box"
                style="background: #ff6b00; border-radius: 20px;">
                <div class="featured-image mb-3">
                    <img src="images/undraw_social_interaction_re_dyjh.svg" class="img-fluid" style="width: 250px">
                    <p class="text-white fs-2">Blogging Made Effortless!</p>
                    <small class="sub-text text-white text-wrap text-center"
                        style="width: 17rem; text-align: center; margin-left: 10%;">Unleash
                        Your Voice, Share Your Story
                    </small>
                </div>
            </div>

            <div class="col-md-6 right-box" style="padding: 40px 30px 40px 40px;">
                <div class="row align-items-center">
                    <div class="header-text mb-4">
                        <p class="logo">Bloggerly</p>
                        <p>Welcome back ! <br>Get login to your account</p>
                    </div>
                    <div class="input-group mb-3">
                        <input type="text" class="form-control form-control-lg bg-light fs-6"
                            placeholder="Username / Email">
                    </div>
                    <div class="input-group mb-1">
                        <input type="password" class="form-control form-control-lg bg-light fs-6"
                            placeholder="Password">
                    </div>
                    <div class="input-group mb-5 d-flex justify-content-between">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="formCheck">
                            <label for="formCheck" class="form-check-label text-secondary"><small>Remember
                                    Me</small></label>
                        </div>
                        <div class="forgot">
                            <small><a href="#">Forgot Password ?</a></small>
                        </div>
                    </div>

                    <div class="input-group mb-3">
                        <button class="btn btn-lg w-100 fs-6 " style="background: #ff7f24; color: #fff;">Login</button>
                    </div>
                    <div class="input-group mb-3">
                        <button class="btn btn-lg btn-light w-100 fs-6"><img src="images/google.svg"
                                style="width: 20px;" class="me-2"><small>Sign In with Google</small></button>
                    </div>
                    <div class="row" style="text-align: center;">
                        <small>Don't have account ? <a href="#">Register</a></small>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
